<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ColdTreasure | News</title>

  <link rel="icon" href="/assets/favicon/favicon.ico?v=6">
  <link rel="stylesheet" href="/assets/css/main.css?v=203" />

  <!-- ColdTreasure Organization Schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "ColdTreasure",
    "url": "https://coldtreasure.com",
    "logo": "https://coldtreasure.com/CT_TRUE_16.png",
    "description": "ColdTreasure is an independent sneaker archive and news platform documenting basketball footwear culture, releases, and design evolution."
  }
  </script>

  <script>window.CT_PAGE = "news";</script>
  <script src="/assets/js/include.v3.js?v=3" defer></script>
  <script src="/assets/js/app.js?v=204" defer></script>

  <style>
    :root{
      --ct-w: 1240px;
      --ct-pad: 26px;
      --ct-line: #ececec;
      --ct-muted:#6f6f6f;
      --ct-shadow: 0 10px 30px rgba(0,0,0,.06);
      --ct-radius: 18px;
      --ct-ink:#111;
    }

    main.page{ max-width: var(--ct-w); margin: 22px auto 0; padding: 0 var(--ct-pad); }
    .page-head{ margin: 18px 0 18px; }
    .page-head__top{ display:flex; align-items:flex-end; justify-content:space-between; gap:16px; }
    .page-title{ margin:0; font-size: 38px; letter-spacing: -0.02em; }
    .page-head__right{ display:flex; align-items:baseline; gap:10px; color: var(--ct-muted); font-size:13px; letter-spacing: .06em; white-space:nowrap; }
    .page-kicker{ font-weight:600; text-transform:uppercase; }
    .page-dot{ opacity:.5; }
    .page-status{ opacity:.85; }
    .page-rule{ margin-top:14px; height:1px; background: var(--ct-line); opacity:.9; }

    .news-list{
      display:flex;
      flex-direction:column;
      gap: 26px;
      margin: 18px 0 0;
      padding: 0;
    }

    .news-item{
      display:flex;
      gap: 18px;
      align-items: stretch;
      border: 1px solid var(--ct-line);
      border-radius: var(--ct-radius);
      background:#fff;
      overflow:hidden;
      box-shadow: 0 6px 18px rgba(0,0,0,.05);
      transition: box-shadow .18s ease, border-color .18s ease;
    }
    .news-item:hover{
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
      border-color: rgba(0,0,0,.08);
    }

    .news-media{
      flex: 0 0 clamp(380px, 42vw, 520px);
      display:block;
      background:#f6f6f6;
      overflow:hidden;
    }
    .news-media img{
      width:100%;
      height:100%;
      aspect-ratio: 3 / 2;
      object-fit: cover;
      display:block;
    }

    .news-body{
      flex:1;
      min-width:0;
      padding: 16px 16px 16px 0;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .news-meta{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      font-size:12px;
      color: var(--ct-muted);
      margin-bottom: 10px;
    }

    .pill{
      border:1px solid var(--ct-line);
      border-radius:999px;
      padding: 4px 10px;
      background:#fff;
    }

    .news-title{
      margin:0 0 10px;
      font-size: 22px;
      line-height: 1.18;
      letter-spacing: -0.01em;
      font-weight: 800;
    }
    .news-title a{
      color: inherit;
      text-decoration:none;
    }

    .news-summary{
      margin:0;
      font-size:14px;
      line-height: 1.65;
      color:#2b2b2b;
      opacity:.85;
      display:-webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow:hidden;
      max-width: 68ch;
    }

    .empty, .error{
      padding: 14px 16px;
      border:1px solid var(--ct-line);
      border-radius: var(--ct-radius);
      color: var(--ct-muted);
      background:#fff;
    }
    .error{
      border-color:#ffd0d0;
      background:#fff5f5;
      color:#7a2b2b;
    }

    .news-more-wrap{
      margin: 34px 0 10px;
      padding-top: 18px;
      border-top: 1px solid var(--ct-line);
      text-align:center;
    }

    .news-more{
      display:inline-flex;
      align-items:baseline;
      justify-content:center;
      gap:8px;
      color:var(--ct-ink);
      text-decoration:none;
      background:transparent;
      border:none;
      padding:0;
      cursor:pointer;
      transition:opacity .18s ease;
      font-family: inherit;
    }
    .news-more:hover{ opacity:.58; }

    .news-more__zh{
      font-size:16px;
      letter-spacing:.04em;
    }
    .news-more__dot{
      font-size:13px;
      opacity:.52;
      transform: translateY(-1px);
    }
    .news-more__en{
      font-size:13px;
      letter-spacing:.08em;
      opacity:.66;
    }

    .news-more.is-ending{
      cursor:default;
      opacity:.62;
      pointer-events:none;
    }

    .news-meta-line{
      margin-top:12px;
      text-align:center;
      font-size:12px;
      color:var(--ct-muted);
      letter-spacing:.05em;
    }

    @media (max-width: 860px){
      main.page{ padding: 0 16px; }
      .page-head__top{ align-items:flex-start; flex-direction:column; gap:10px; }
      .page-title{ font-size: 34px; }

      .news-item{ flex-direction:column; gap: 0; }
      .news-media{ flex: 0 0 auto; width:100%; }
      .news-media img{ aspect-ratio: 16 / 10; }
      .news-body{ padding: 14px 16px 16px; }
      .news-title{ font-size: 20px; }

      .news-more-wrap{
        margin-top:28px;
      }
      .news-more__zh{
        font-size:15px;
      }
      .news-more__en,
      .news-more__dot{
        font-size:12px;
      }
    }
  </style>
</head>
<body>
  <div data-include="/modules/header/header.html"></div>

  <main class="page">
    <header class="page-head">
      <div class="page-head__top">
        <h1 class="page-title">News</h1>
        <div class="page-head__right">
          <span class="page-kicker">Daily drops</span>
          <span class="page-dot" aria-hidden="true">•</span>
          <span class="page-status" id="pageStatus">Loading…</span>
        </div>
      </div>
      <div class="page-rule" aria-hidden="true"></div>
    </header>

    <div id="app" class="empty">Loading…</div>
    <div id="moreMount"></div>

    <div data-include="/modules/footer/footer.html"></div>
  </main>

  <script>
    const PAGE_SIZE = 10;

    function escapeHtml(str){
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function getQuery(){
      try{
        const q = new URL(location.href).searchParams.get("q") || "";
        return q.trim();
      }catch(e){
        return "";
      }
    }

    function normLoose(s=""){
      return String(s ?? "").toLowerCase().trim();
    }

    function termsOf(q){
      return normLoose(q).split(/\s+/).map(s => s.trim()).filter(Boolean);
    }

    function isSignedImageUrl(url){
      const u = String(url || "");
      if(!u) return false;
      return (
        /[?&]X-Amz-/i.test(u) ||
        /notion\.so\/image/i.test(u) ||
        /[?&]signature=/i.test(u) ||
        /[?&]token=/i.test(u)
      );
    }

    function safeImgSrc(url, v){
      const u = String(url || "").trim();
      if(!u) return "";
      if (isSignedImageUrl(u)) return u;

      if (u.includes("?")) return `${u}&v=${encodeURIComponent(v || Date.now())}`;
      return `${u}?v=${encodeURIComponent(v || Date.now())}`;
    }

    function contentToText(content){
      if (!content) return "";

      if (typeof content === "string") {
        const s = content.trim();
        if ((s.startsWith("[") && s.endsWith("]")) || (s.startsWith("{") && s.endsWith("}"))) {
          try {
            const parsed = JSON.parse(s);
            return contentToText(parsed);
          } catch (e) {}
        }
        return s;
      }

      if (Array.isArray(content)){
        const parts = [];
        for (const b of content){
          if (!b) continue;

          if (b.type === "p" && b.text) parts.push(String(b.text));
          else if (b.type === "h2" && b.text) parts.push(String(b.text));
          else if (b.type === "ul" && Array.isArray(b.items)) parts.push(b.items.join(" "));
          else if (typeof b === "string") parts.push(b);

          if (parts.join(" ").length > 240) break;
        }
        return parts.join(" ").replace(/\s+/g, " ").trim();
      }

      if (typeof content === "object"){
        if (content.text) return String(content.text).trim();
        try { return JSON.stringify(content); } catch(e) {}
        return "";
      }

      return String(content).trim();
    }

    function matchesPost(post, q){
      const terms = termsOf(q);
      if(!terms.length) return true;

      const title = post.title || "";
      const brand = Array.isArray(post.brand) ? post.brand.join(" ") : (post.brand || "");
      const keywords = Array.isArray(post.keywords) ? post.keywords.join(" ") : "";
      const release = post.release_info || "";
      const content = contentToText(post.content);

      const hay = normLoose([title, brand, keywords, release, content, post.slug || "", post.id || ""].join(" "));
      return terms.every(t => hay.includes(t));
    }

    async function loadPosts(){
      const res = await fetch(`/api/posts?v=${Date.now()}`, { cache:"no-store" });
      const data = await res.json().catch(() => null);

      if(!res.ok){
        throw new Error(data?.error || `Failed to load /api/posts (${res.status})`);
      }

      if (Array.isArray(data)) return data;
      if (Array.isArray(data?.posts)) return data.posts;
      return [];
    }

    function getSummary(post){
      const s = String(post.excerpt || post.summary || "").trim();
      if (s) return s;

      const c = contentToText(post.content);
      if (!c) return "";
      return c.length > 120 ? (c.slice(0, 120) + "…") : c;
    }

    function renderItem(post){
      const title = post.title || "Untitled";
      const summary = getSummary(post);
      const date = post.publishAt || "";
      const brand = Array.isArray(post.brand) ? post.brand.join(", ") : (post.brand || "");

      const brandHtml = brand ? `<span class="pill">${escapeHtml(brand)}</span>` : "";
      const dateHtml  = date  ? `<span class="date">${escapeHtml(date)}</span>` : "";

      const badges = [];
      if (post.record) {
        badges.push(`<span class="news-badge news-badge--record">RECORD</span>`);
      }
      if (post.archive) {
        badges.push(`<span class="news-badge news-badge--archive">ARCHIVE</span>`);
      }

      const badgeHtml = badges.length
        ? `<div class="news-badges">${badges.join("")}</div>`
        : "";

      const slug = String(post.slug || "").trim();
      const href = `/post/?slug=${encodeURIComponent(slug)}`;

      const hero = String(post.cover || "").trim();
      const imgSrc = hero ? safeImgSrc(hero, (date || Date.now())) : "";

      return `
        <article class="news-item">
          <a class="news-media" href="${href}" aria-label="${escapeHtml(title)}">
            ${imgSrc ? `<img src="${escapeHtml(imgSrc)}" alt="${escapeHtml(title)}" loading="lazy">` : ``}
          </a>

          <div class="news-body">
            ${badgeHtml} <!-- ✅ 插在最上方 -->
            
            <div class="news-meta">${brandHtml}${dateHtml}</div>
            
            <h2 class="news-title">
              <a href="${href}">${escapeHtml(title)}</a>
            </h2>
            ${summary ? `<p class="news-summary">${escapeHtml(summary)}</p>` : ``}
          </div>
        </article>
      `;
    }

    function renderLoadMore(hasAnyPosts){
      const mount = document.getElementById("moreMount");
      if (!mount) return;

      if (!hasAnyPosts){
        mount.innerHTML = "";
        return;
      }

      mount.innerHTML = `
        <div class="news-more-wrap">
          <button id="newsMoreBtn" class="news-more" type="button">
            <span class="news-more__zh">更多资讯</span>
            <span class="news-more__dot">·</span>
            <span class="news-more__en">More News</span>
          </button>
          <div id="newsMetaLine" class="news-meta-line"></div>
        </div>
      `;
    }

    function setEndingState(){
      const btn = document.getElementById("newsMoreBtn");
      if (!btn) return;

      btn.classList.add("is-ending");
      btn.innerHTML = `
        <span class="news-more__zh">已显示全部资讯</span>
        <span class="news-more__dot">·</span>
        <span class="news-more__en">Ending</span>
      `;
    }

    function setLoadMoreState(){
      const btn = document.getElementById("newsMoreBtn");
      if (!btn) return;

      btn.classList.remove("is-ending");
      btn.innerHTML = `
        <span class="news-more__zh">更多资讯</span>
        <span class="news-more__dot">·</span>
        <span class="news-more__en">More News</span>
      `;
    }

    (async function main(){
      const app = document.getElementById("app");
      const statusEl = document.getElementById("pageStatus");

      await new Promise((resolve) => {
        let done = false;
        const finish = () => { if(done) return; done = true; resolve(); };
        document.addEventListener("modules:loaded", finish, { once: true });
        setTimeout(finish, 1200);
      });

      const q = getQuery();

      try{
        const listAll = await loadPosts();
        const filtered = q ? listAll.filter(p => matchesPost(p, q)) : listAll;

        const sorted = [...filtered].sort((a, b) => {
          const da = new Date(a?.publishAt || 0).getTime();
          const db = new Date(b?.publishAt || 0).getTime();
          return db - da;
        });

        const totalItems = sorted.length;
        let visibleCount = Math.min(PAGE_SIZE, totalItems);

        if(!totalItems){
          if (statusEl){
            statusEl.textContent = q ? `0 results · “${q}”` : `0 posts`;
          }
          app.className = "empty";
          app.innerHTML = q
            ? `No results for <b>${escapeHtml(q)}</b>.`
            : `No posts yet.`;
          document.getElementById("moreMount").innerHTML = "";
          return;
        }

        renderLoadMore(true);

        function renderVisible(){
          const visibleItems = sorted.slice(0, visibleCount);
          app.className = "";
          app.innerHTML = `<section class="news-list">${visibleItems.map(renderItem).join("")}</section>`;

          const meta = document.getElementById("newsMetaLine");
          if (meta) {
            meta.textContent = `Showing ${visibleItems.length} / ${totalItems}`;
          }

          if (statusEl){
            if(q){
              statusEl.textContent = `${totalItems} results · Showing ${visibleItems.length} · “${q}”`;
            }else{
              statusEl.textContent = `${totalItems} posts · Showing ${visibleItems.length}`;
            }
          }

          setLoadMoreState();
        }

        renderVisible();

        const btn = document.getElementById("newsMoreBtn");
        if (btn){
          btn.addEventListener("click", () => {
            if (visibleCount >= totalItems) {
              setEndingState();
              return;
            }

            const nextVisibleCount = Math.min(visibleCount + PAGE_SIZE, totalItems);

            if (nextVisibleCount === visibleCount) {
              setEndingState();
              return;
            }

            visibleCount = nextVisibleCount;
            renderVisible();

            if (visibleCount >= totalItems) {
              setEndingState();
            }
          });
        }
      }catch(err){
        if (statusEl) statusEl.textContent = "Error";
        app.className = "error";
        app.innerHTML = `<b>Load failed</b><div style="margin-top:8px;">${escapeHtml(err.message || err)}</div>`;
        document.getElementById("moreMount").innerHTML = "";
      }
    })();
  </script>
</body>
</html>
