<!-- /post/index.html -->
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ColdTreasure | Post</title>

  <link rel="icon" href="/assets/favicon/favicon.ico?v=6">
  <link rel="stylesheet" href="/assets/css/main.css?v=204" />

  <!-- ColdTreasure Organization Schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "ColdTreasure",
    "url": "https://coldtreasure.com",
    "logo": "https://coldtreasure.com/CT_TRUE_16.png",
    "description": "ColdTreasure is an independent sneaker archive and news platform documenting basketball footwear culture, releases, and design evolution."
  }
  </script>

  <style>
    :root{
      --w: 980px;
      --muted:#777;
      --line:#eee;
    }

    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans SC", Arial;
      background:#fff;
      color:#111;
    }

    main{
      max-width: var(--w);
      margin: 24px auto 64px;
      padding: 0 18px;
    }

    .meta{
      color:var(--muted);
      font-size:14px;
      margin: 8px 0 18px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    h1{
      font-size:30px;
      line-height:1.2;
      margin:0 0 8px;
      letter-spacing:.2px;
    }

    .hero{
      width:100%;
      margin:0;
      border-radius:14px;
      overflow:hidden;
      background:#f6f6f6;
      border:1px solid var(--line);
      aspect-ratio: 3 / 2;
    }

    .hero img{
      width:100%;
      height:100%;
      object-fit:cover;
      object-position: var(--hero-focus, 50% 50%);
      display:block;
    }

    .summary{
      font-size:16px;
      line-height:1.7;
      margin: 16px 0 6px;
      color:#222;
    }

    .content{
      margin-top:18px;
      font-size:16px;
      line-height:1.85;
    }

    .content h2{
      font-size:18px;
      margin: 22px 0 10px;
    }

    .content p{
      margin: 12px 0;
    }

    .content ul{
      margin: 10px 0 14px 18px;
    }

    /* 发售信息 */
    .post-release{
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .post-release h2{
      font-size:18px;
      margin: 0 0 10px;
    }

    .post-release ul{
      margin: 10px 0 0 18px;
    }

    .post-release p{
      margin: 10px 0;
    }

    /* 图集 */
    .gallery{
      margin-top:26px;
    }

    .gallery h2{
      font-size:18px;
      margin:0 0 10px;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(2, 1fr);
      gap:10px;
    }

    .grid img{
      width:100%;
      height:auto;
      border-radius:12px;
      border:1px solid var(--line);
      background:#f6f6f6;
      display:block;
    }

    .error{
      padding:14px;
      border:1px solid #ffd0d0;
      background:#fff5f5;
      border-radius:14px;
    }

    .muted{
      color:var(--muted);
    }

    @media (max-width: 720px){
      .grid{
        grid-template-columns: 1fr;
      }

      h1{
        font-size:26px;
      }
    }
  </style>

  <script>
    window.CT_PAGE = "post";
    document.documentElement.classList.add("ct-nav--solid");
    document.documentElement.classList.remove("ct-nav--overlay");
  </script>

  <script src="/assets/js/include.v3.js?v=4" defer></script>
  <script src="/assets/js/header.js?v=2" defer></script>
  <script src="/assets/js/post.js?v=7" defer></script>
</head>

<body>
  <div data-include="/modules/header/header.html"></div>

  <main id="app">
    <div class="muted">Loading…</div>
  </main>

  <div data-include="/modules/footer/footer.html"></div>

  <template id="tpl-post">
    <article class="post">
      <header class="post-head">
        <h1 class="post-title"></h1>
        <div class="meta post-meta"></div>
      </header>

      <figure class="hero">
        <img class="post-hero" alt="" />
      </figure>

      <p class="summary post-summary" hidden></p>

      <section class="content post-content"></section>

      <section class="post-release" data-release>
        <h2>发售信息</h2>
        <div class="post-release__body" data-release-body></div>
      </section>

      <section class="gallery post-gallery" hidden>
        <h2>图集</h2>
        <div class="grid post-grid"></div>
      </section>
    </article>
  </template>
</body>
</html>
